<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Page Not Found</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/404.css">
</head>
<body>

<div class="container">
  <div class="illustration">
    <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="100" cy="100" r="95" stroke="#38bdf8" stroke-width="2" opacity="0.2"/>
      <circle cx="100" cy="100" r="85" stroke="#38bdf8" stroke-width="2" opacity="0.3"/>
      <text x="100" y="120" font-size="60" font-weight="bold" text-anchor="middle" fill="#38bdf8" opacity="0.6">?</text>
    </svg>
  </div>

  <h1 class="error-code">404</h1>
  <h2 class="error-title">Page Not Found</h2>
  <p class="error-description">
    Oops! The page you're looking for doesn't exist or has been moved. 
    Let's get you back on track.
  </p>

  <div class="button-group">
    <a href="./index.html" class="btn btn-primary">← Back to Home</a>
  </div>

  <div class="suggestions"></div>
</div>

</body>
</html>
